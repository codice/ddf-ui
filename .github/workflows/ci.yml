name: CI

on:
  push:
    branches:
      - master
      - '[0-9]+.[0-9]+.x'
  pull_request:
    branches:
      - master
      - '[0-9]+.[0-9]+.x'
  schedule:
    - cron: '0 18 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: '-Xmx4G -Xms1G -Djava.security.egd=file:/dev/./urandom'
  MAVEN_CLI_OPTS: '-B -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn'

jobs:
  incremental-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Maven settings
        run: mkdir -p ~/.m2 && cp .github/maven-settings.xml ~/.m2/settings.xml

      - name: Build
        run: mvn clean install $MAVEN_CLI_OPTS -DskipTests

  full-build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Maven settings
        run: mkdir -p ~/.m2 && cp .github/maven-settings.xml ~/.m2/settings.xml

      - name: Build
        run: mvn clean install $MAVEN_CLI_OPTS -DskipTests

  deploy:
    needs: full-build
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/master' || contains(github.ref, '.x'))
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Maven settings
        run: mkdir -p ~/.m2 && cp .github/maven-settings.xml ~/.m2/settings.xml

      - name: Deploy
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          mvn deploy $MAVEN_CLI_OPTS \
            -DskipTests=true \
            -DretryFailedDeploymentCount=10 \
            -Dreleases.repository.url=https://repo.codice.org/repository/maven-releases/ \
            -Dsnapshots.repository.url=https://repo.codice.org/repository/maven-snapshots/
